name: Setup Full Environment

on:
  push:

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    services:
        postgres:
          image: postgres:13
          env:
            POSTGRES_USER: backstage
            POSTGRES_PASSWORD: backstage
            POSTGRES_DB: backstage
          ports:
            - 5432:5432
          
          options: >-
            --health-cmd="pg_isready -U backstage"
            --health-interval=10s
            --health-timeout=5s
            --health-retries=5

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/iron'

      # -------------------------
      # ENABLE YARN 4.4.1
      # -------------------------
      - name: Enable Yarn 4.4.1
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate
          yarn -v
      # -------------------------
      # VERIFY DOCKER
      # -------------------------
      - name: Verify Docker
        run: |
          docker --version
          docker compose version || true
      # -------------------------
      # CREATE BACKSTAGE APP
      # -------------------------
      - name: Create Backstage App
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          cd /tmp
          echo "my-backstage-app" | npx @backstage/create-app@latest
      # -------------------------
      # COPY BACKSTAGE APP → REPO
      # -------------------------
      - name: Copy Backstage App Into Repo
        run: |
          rsync -av /tmp/my-backstage-app/ $GITHUB_WORKSPACE/ --exclude=.git
      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      
      - name: Install Backstage Dependencies
        run: yarn install --frozen-lockfile
 
      # -------------------------
     
      
       
      # -------------------------
      # TYPE CHECK
      - name: Type Check
        run: yarn tsc

      # -------------------------
      # BUILD BACKEND
      - name: Build Backstage Backend
        run: yarn build:backend

      # -------------------------
      # APPLY DATABASE MIGRATIONS 
      
      - name: Install Knex CLI
        run: yarn workspace backend add --dev knex

      
      
      - name: Apply Database Migrations
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_USER: backstage
          POSTGRES_PASSWORD: backstage
          POSTGRES_DB: backstage
   #     run: |
    #      yarn workspace backend knex migrate:latest




      
      
      
      
      
      # -------------------------
      # SET UP DOCKER BUILDX
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2

      # -------------------------
      # BUILD DOCKER IMAGE WITH SQLITE
      - name: Build Backstage Docker Image with SQLite
        run: |
          docker buildx build .             -f packages/backend/Dockerfile             --tag myorg/backstage-app:latest             --load

      
      
      
      
      
       
      
      
      
       
      
      
      
      
      
      
      
      
      
      
      
      
      
      
       
       
       
      
      
      








      
 # SAVE IMAGE AS TAR
      # -------------------------
      - name: Save Docker Image to Tar
        run: |
          docker save myorg/backstage-app:latest -o backstage-image.tar

      # -------------------------
      # UPLOAD IMAGE AS ARTIFACT
      # -------------------------
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backstage-docker-image
          path: backstage-image.tar

      
      
      
      
      
      
      
      # -------------------------
      # RUN CONTAINER
      # -------------------------
      - name: Run Backstage Container
        run: |
          docker rm -f backstage || true
          docker run -d --name backstage -p 7007:7007 myorg/backstage-app:latest
          docker ps -a

     
