name: Setup Full Environment


on:
  push:


jobs:
  setup-environment:
    runs-on: ubuntu-latest
    
    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4


      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/iron'


      # -------------------------
      # ENABLE YARN 4.4.1
      # -------------------------
      - name: Enable Yarn 4.4.1
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate
          yarn -v
      # -------------------------
      # VERIFY DOCKER
      # -------------------------
      - name: Verify Docker
        run: |
          docker --version
          docker compose version || true
      # -------------------------
      # CREATE BACKSTAGE APP
      - name: Scaffold Backstage App
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          # Use temporary directory to avoid permission issues
          APP_DIR="${RUNNER_TEMP}/my-backstage-app"
          mkdir -p "$APP_DIR"
          cd "$APP_DIR"

          # Download and run latest Backstage CLI directly using npx
          # --ignore-existing ensures latest version is fetched every time
          echo "my-backstage-app" | npx --yes --ignore-existing @backstage/create-app@latest

          cd my-backstage-app

          # Upgrade all Backstage packages to latest 1.x
          yarn up "@backstage/*"

          # Install dependencies
          yarn install

      # -------------------------
      # Verify Backstage App
      - name: Verify Backstage App
        run: |
          cd "${RUNNER_TEMP}/my-backstage-app/my-backstage-app"
          yarn backstage-cli --version
          yarn list "@backstage/*" --depth=0
     

      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      

      
      
      
      
      
        
        
        
        
        
        
        
      
        
        
        
      
      # -------------------------
      # COPY BACKSTAGE APP → REPO
      # -------------------------
      - name: Copy Backstage App Into Repo
        run: |
          rsync -av /tmp/my-backstage-app/ $GITHUB_WORKSPACE/ --exclude=.git
      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      
      - name: Install Backstage Dependencies
        run: yarn install --frozen-lockfile
 
      # -------------------------
     
      
       
      # -------------------------
      # TYPE CHECK
      - name: Type Check
        run: yarn tsc


      # -------------------------
      # BUILD BACKEND
      - name: Build Backstage Backend
        run: yarn build:backend


       
      
                                        
      
        
      
           
      
      
      
      
      
      
      
      
      
      # -------------------------
      # SET UP DOCKER BUILDX
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2


      # -------------------------
      # BUILD DOCKER IMAGE 
      - name: Build Backstage Docker Image 
        run: |
          docker buildx build .            -f packages/backend/Dockerfile             --tag myorg/backstage-app:latest             --load

      
      
      
      
      
       
      
      
      
       
      
      
      
      
      
      
      
      
      
      
      
      
      
      
       
       
       
      
      
      
















      
 # SAVE IMAGE AS TAR
      # -------------------------
      - name: Save Docker Image to Tar
        run: |
          docker save myorg/backstage-app:latest -o backstage-image.tar

      # -------------------------
      # UPLOAD IMAGE AS ARTIFACT
      # -------------------------
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backstage-docker-image
          path: backstage-image.tar


      
      
      
      
      
      
      
      # -------------------------
      # RUN CONTAINER
      # -------------------------
      - name: Run Backstage Container
        run: |
          docker rm -f backstage || true
          docker run -d --name backstage-app -p 7001:7001 myorg/backstage-app:latest
          docker ps -a

     
