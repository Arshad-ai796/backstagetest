name: Build Standalone Backstage (SQLite)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # Checkout Source Code
      # ------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ------------------------------
      # Setup Node.js
      # ------------------------------
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/iron'

      # ------------------------------
      # Enable Yarn 4.4.1
      # ------------------------------
      - name: Enable Yarn
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate
          yarn -v

      # ------------------------------
      # Install Backstage dependencies
      # ------------------------------
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ------------------------------
      # Build backend
      # ------------------------------
      - name: Build Backstage backend
        run: yarn build:backend

      # ------------------------------
      # Create SQLite production config
      # ------------------------------
      - name: Create app-config.production.yaml
        run: |
          cat > app-config.production.yaml << 'EOF'
          backend:
            database:
              client: sqlite3
              connection:
                filename: /app/data/backstage.db
          EOF

      # ------------------------------
      # Patch Dockerfile for SQLite + entrypoint
      # ------------------------------
      - name: Patch Dockerfile for SQLite
        run: |
          DOCKERFILE="packages/backend/Dockerfile"

          # Add SQLite installation and data folder after FROM
          sed -i '/FROM node:18-alpine/a RUN apk add --no-cache sqlite sqlite-libs' "$DOCKERFILE"
          sed -i '/FROM node:18-alpine/a RUN mkdir -p /app/data' "$DOCKERFILE"

          # Create entrypoint script to run migrations & start backend
          ENTRYPOINT_SCRIPT="packages/backend/docker-entrypoint.sh"
          cat > "$ENTRYPOINT_SCRIPT" << 'EOF'
          #!/bin/sh
          mkdir -p /app/data
          yarn workspace backend migrate
          exec node packages/backend --config app-config.production.yaml
          EOF
          chmod +x "$ENTRYPOINT_SCRIPT"

          # Add ENTRYPOINT to Dockerfile if not already present
          grep -q "ENTRYPOINT" "$DOCKERFILE" || \
          echo 'ENTRYPOINT ["/app/packages/backend/docker-entrypoint.sh"]' >> "$DOCKERFILE"

      # ------------------------------
      # Setup Docker Buildx
      # ------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ------------------------------
      # Build Docker image
      # ------------------------------
      - name: Build Backstage Docker image
        run: |
          docker buildx build . \
            -f packages/backend/Dockerfile \
            --tag myorg/backstage-app:latest \
            --load

      # ------------------------------
      # Save Docker image as TAR
      # ------------------------------
      - name: Save Docker image to tar
        run: |
          docker save myorg/backstage-app:latest -o backstage-image.tar

      # ------------------------------
      # Upload Docker image artifact
      # ------------------------------
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backstage-docker-image
          path: backstage-image.tar
