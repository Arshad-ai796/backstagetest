name: Setup Full Environment

on:
  push:

jobs:
  setup-environment:
    runs-on: ubuntu-latest
    
      steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/iron'

      # -------------------------
      # ENABLE YARN 4.4.1
      # -------------------------
      - name: Enable Yarn 4.4.1
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate
          yarn -v
      # -------------------------
      # VERIFY DOCKER
      # -------------------------
      - name: Verify Docker
        run: |
          docker --version
          docker compose version || true
      # -------------------------
      # CREATE BACKSTAGE APP
      # -------------------------
      - name: Create Backstage App
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          cd /tmp
          echo "my-backstage-app" | npx @backstage/create-app@latest
      # -------------------------
      # COPY BACKSTAGE APP → REPO
      # -------------------------
      - name: Copy Backstage App Into Repo
        run: |
          rsync -av /tmp/my-backstage-app/ $GITHUB_WORKSPACE/ --exclude=.git
      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      
      - name: Install Backstage Dependencies
        run: yarn install --frozen-lockfile
 
      # -------------------------
     
      
       
      # -------------------------
      # TYPE CHECK
      - name: Type Check
        run: yarn tsc

      # -------------------------
      # BUILD BACKEND
      - name: Build Backstage Backend
        run: yarn build:backend

      # -------------------------
      name: Build Standalone Backstage (SQLite)

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # ------------------------------
      # Checkout Source Code
      # ------------------------------
      - name: Checkout repo
        uses: actions/checkout@v4

      # ------------------------------
      # Setup Node.js LTS
      # ------------------------------
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/iron'

      # ------------------------------
      # Enable Yarn 4
      # ------------------------------
      - name: Enable Yarn 4
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate
          yarn -v

      # ------------------------------
      # Install Backstage dependencies
      # ------------------------------
      - name: Install dependencies
        run: yarn install --frozen-lockfile

      # ------------------------------
      # Build Backstage backend
      # ------------------------------
      - name: Build Backstage backend
        run: yarn build:backend

      # ------------------------------
      # Patch SQLite production config
      # ------------------------------
      - name: Create app-config.production.yaml
        run: |
          cat > app-config.production.yaml << 'EOF'
          backend:
            database:
              client: sqlite3
              connection:
                filename: /app/data/backstage.db
          EOF

      # ------------------------------
      # Patch Dockerfile to install SQLite & create folder
      # ------------------------------
      - name: Patch Dockerfile for SQLite
        run: |
          DOCKERFILE="packages/backend/Dockerfile"

          grep -q "sqlite" "$DOCKERFILE" || \
          sed -i '1a RUN apk add --no-cache sqlite sqlite-libs' "$DOCKERFILE"

          grep -q "/app/data" "$DOCKERFILE" || \
          sed -i '1a RUN mkdir -p /app/data' "$DOCKERFILE"

      # ------------------------------
      # Setup Docker Buildx
      # ------------------------------
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      # ------------------------------
      # Build Docker image
      # ------------------------------
      - name: Build Backstage Docker image
        run: |
          docker buildx build . \
            -f packages/backend/Dockerfile \
            --tag myorg/backstage-app:latest \
            --load

      # ------------------------------
      # Save Docker image as TAR
      # ------------------------------
      - name: Save Docker image to tar
        run: |
          docker save myorg/backstage-app:latest -o backstage-image.tar

      # ------------------------------
      # Upload Docker image artifact
      # ------------------------------
      - name: Upload Docker image artifact
        uses: actions/upload-artifact@v4
        with:
          name: backstage-docker-image
          path: backstage-image.tar

      
      
        
       
      
                                        
      
        
      
           
      
      
      
      
      
      
      
      
      
