name: Setup Full Environment

on:
  push:

jobs:
  setup-environment:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/iron'

      # -------------------------
      # ENABLE YARN 4.4.1
      # -------------------------
      - name: Enable Yarn 4.4.1
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate
          yarn -v
      # -------------------------
      # VERIFY DOCKER
      # -------------------------
      - name: Verify Docker
        run: |
          docker --version
          docker compose version || true
      # -------------------------
      # CREATE BACKSTAGE APP
      # -------------------------
      - name: Create Backstage App
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          cd /tmp
          echo "my-backstage-app" | npx @backstage/create-app@latest
      # -------------------------
      # COPY BACKSTAGE APP → REPO
      # -------------------------
      - name: Copy Backstage App Into Repo
        run: |
          rsync -av /tmp/my-backstage-app/ $GITHUB_WORKSPACE/ --exclude=.git
      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      - name: Install Backstage Dependencies
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          yarn install
      # -------------------------
      # TYPE CHECK
      # -------------------------
      - name: Type Check
        run: yarn tsc

      # -------------------------
      # BUILD BACKEND
        - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # -------------------------
      # BUILD DOCKER IMAGE
      # -------------------------
      - name: Build Backstage Docker Image
        run: |
          docker buildx build . \
            -f packages/backend/Dockerfile \
            --tag myorg/backstage:latest \
            --load

      # -------------------------
      # RUN CONTAINER
      # -------------------------
      - name: Run Backstage Container
        run: |
          docker rm -f backstage || true
          docker run -d --name backstage -p 7007:7007 myorg/backstage:latest
          docker ps -a
      
      
      
      
      
      
        
      
      



      
      # -------------------------
      - name: Build Backstage Backend
        run: yarn build:backend
