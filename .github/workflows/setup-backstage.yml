name: Backstage Setup & Dev Verification

on:
  push:
    branches: [ main ]
  workflow_dispatch: {}

jobs:
  backstage:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:

      # 1. Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 2. Install system dependencies
      - name: Install system dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential curl git

      # 3. Setup Node (NO YARN CACHE → FIXES YOUR ERROR)
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # 4. Enable Yarn
      - name: Setup Yarn 4.4.1
        run: |
          corepack enable
          yarn set version 4.4.1
          yarn -v

      # 5. Create Backstage app if missing
      - name: Create Backstage App if missing
        id: create
        run: |
          if [ -d "backstage" ]; then
            echo "exists=true" >> $GITHUB_OUTPUT
            echo "Backstage folder already exists."
          else
            echo "Creating Backstage app..."
            npx @backstage/create-app@latest backstage --no-interactive
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      # 6. Commit new scaffold
      - name: Commit Backstage scaffold
        if: steps.create.outputs.exists == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Automated: Add Backstage scaffold"
          git push origin main

      # 7. Install dependencies (NO IMMUTABLE → FIXES ERRORS)
      - name: Install dependencies
        working-directory: backstage
        run: |
          yarn install

      # 8. Optional tests
      - name: Run tests
        working-directory: backstage
        run: |
          yarn test || echo "No tests available"

      # 9. Boot Backstage dev in background
      - name: Start Backstage server
        working-directory: backstage
        run: |
          nohup yarn dev > server.log 2>&1 &
          echo "Waiting for Backstage to start..."
          for i in {1..40}; do
            if curl -s http://localhost:7007 >/dev/null; then
              echo "Backstage backend is UP ✔"
              break
            fi
            sleep 2
          done
          echo "----- LOGS -----"
          tail -n 100 server.log || true

      # 10. Final health check
      - name: Health check
        run: |
          curl -I http://localhost:7007 || exit 1
