name: Setup Full Environment


on:
  push:


jobs:
  setup-environment:
    runs-on: ubuntu-latest
    
    steps:
      # -------------------------
      # CHECKOUT
      # -------------------------
      - name: Checkout repository
        uses: actions/checkout@v4


      # -------------------------
      # SETUP NODE
      # -------------------------
      - name: Setup Node.js LTS
        uses: actions/setup-node@v4
        with:
          node-version: 'lts/iron'


      # -------------------------
      # ENABLE YARN 4.4.1
      # -------------------------
      - name: Enable Yarn 4.4.1
        run: |
          corepack enable
          corepack prepare yarn@4.4.1 --activate
          yarn -v
      # -------------------------
      # VERIFY DOCKER
      # -------------------------
      - name: Verify Docker
        run: |
          docker --version
          docker compose version || true
      # -------------------------
      # CREATE BACKSTAGE APP
      # -------------------------
         # INSTALL LATEST BACKSTAGE CREATE-APP
      # -------------------------
      - name: Install Backstage create-app globally
        run: |
          set -o pipefail
          npm install -g @backstage/create-app@latest --no-fund --silent
          STATUS=$?
          if [ $STATUS -ne 0 ]; then
          echo "❌ Backstage create-app install failed with exit code $STATUS"
          exit 1
          fi

          echo "$(npm bin -g)" >> $GITHUB_PATH
      
      
      
      
      
      
      
      
      
      
      # -------------------------
      # CHECK CREATE-APP VERSION
      # -------------------------
      - name: Ensure latest Backstage create-app is installed
        run: |
          set -e
          INSTALLED_VERSION=$(npm list -g @backstage/create-app --depth=0 --json | jq -r '.dependencies["@backstage/create-app"].version // empty')
          LATEST_VERSION=$(npm view @backstage/create-app version)

          echo "Installed version: $INSTALLED_VERSION"
          echo "Latest version: $LATEST_VERSION"

          if [ "$INSTALLED_VERSION" != "$LATEST_VERSION" ]; then
            echo "Error: Latest Backstage create-app ($LATEST_VERSION) is not installed globally."
            exit 1
          fi
          echo "Latest Backstage create-app is installed."

      # -------------------------
      - name: Scaffold Backstage App
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          cd /tmp

          create-app --yes --path my-backstage-app --skip-install

          cd my-backstage-app

          yarn up "@backstage/*"
          yarn install
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      
      # -------------------------
      # OPTIONAL: VERIFY APP
      # -------------------------
      - name: Verify Backstage packages
        run: |
          cd /tmp/my-backstage-app
          yarn backstage-cli versions
      
      
      
      
      
      
        
        
        
        
        
        
        
      
        
        
        
      
      # -------------------------
      # COPY BACKSTAGE APP → REPO
      # -------------------------
      - name: Copy Backstage App Into Repo
        run: |
          rsync -av /tmp/my-backstage-app/ $GITHUB_WORKSPACE/ --exclude=.git
      # -------------------------
      # INSTALL DEPENDENCIES
      # -------------------------
      
      - name: Install Backstage Dependencies
        run: yarn install --frozen-lockfile
 
      # -------------------------
     
      
       
      # -------------------------
      # TYPE CHECK
      - name: Type Check
        run: yarn tsc


      # -------------------------
      # BUILD BACKEND
      - name: Build Backstage Backend
        run: yarn build:backend


       
      
                                        
      
        
      
           
      
      
      
      
      
      
      
      
      
      # -------------------------
      # SET UP DOCKER BUILDX
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@b5ca514318bd6ebac0fb2aedd5d36ec1b5c232a2


      # -------------------------
      # BUILD DOCKER IMAGE 
      - name: Build Backstage Docker Image 
        run: |
          docker buildx build .            -f packages/backend/Dockerfile             --tag myorg/backstage-app:latest             --load

      
      
      
      
      
       
      
      
      
       
      
      
      
      
      
      
      
      
      
      
      
      
      
      
       
       
       
      
      
      
















      
 # SAVE IMAGE AS TAR
      # -------------------------
      - name: Save Docker Image to Tar
        run: |
          docker save myorg/backstage-app:latest -o backstage-image.tar

      # -------------------------
      # UPLOAD IMAGE AS ARTIFACT
      # -------------------------
      - name: Upload Docker Image Artifact
        uses: actions/upload-artifact@v4
        with:
          name: backstage-docker-image
          path: backstage-image.tar


      
      
      
      
      
      
      
      # -------------------------
      # RUN CONTAINER
      # -------------------------
      - name: Run Backstage Container
        run: |
          docker rm -f backstage || true
          docker run -d --name backstage-app -p 7001:7001 myorg/backstage-app:latest
          docker ps -a

     
