name: Setup Full Environment

on:
  push:
  pull_request:

jobs:
  setup-environment:
    runs-on: ubuntu-latest

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Update system packages
      - name: Update system
        run: |
          sudo apt update && sudo apt upgrade -y

      # Install build tools
      - name: Install build essentials
        run: |
          sudo apt install -y curl wget git build-essential make

      # Install NVM
      - name: Install NVM
        run: |
          curl -o- https://raw.githubusercontent.com/nvm-sh/nvm/v0.39.7/install.sh | bash
          echo "NVM_DIR=$HOME/.nvm" >> $GITHUB_ENV

      # Install Node.js LTS (Iron)
      - name: Install Node.js
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          nvm install lts/iron
          nvm use lts/iron
          node -v
          npm -v

      # Use Yarn 3 for Backstage
      - name: Use Yarn 3
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          corepack prepare yarn@3.6.1 --activate
          yarn -v

      # Install Docker
      - name: Install Docker
        run: |
          sudo apt install -y ca-certificates curl gnupg lsb-release
          sudo mkdir -p /etc/apt/keyrings
          curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
            | sudo gpg --dearmor -o /etc/apt/keyrings/docker.gpg
          echo \
            "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
            https://download.docker.com/linux/ubuntu \
            $(lsb_release -cs) stable" \
            | sudo tee /etc/apt/sources.list.d/docker.list > /dev/null
          sudo apt update
          sudo apt install -y docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin
          sudo usermod -aG docker $USER

      # Verify tools
      - name: Verify installations
        run: |
          echo "--- Build Tools ---"
          make --version
          gcc --version

          echo "--- Node & Yarn ---"
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"
          node -v
          npm -v
          yarn -v

          echo "--- Docker ---"
          docker --version
          docker compose version || true

      # Create Backstage app (non-interactive)
      - name: Create Backstage App
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd $HOME
          echo "my-backstage-app" | npx @backstage/create-app@latest
      - name: Move generated app into repo
        run: |
          rm -rf ./* .github  # ensure clean repo except workflow
          cp -R /tmp/backstage/my-backstage-app/* .
          cp -R /tmp/backstage/my-backstage-app/.* . || true








          

      # Build Backstage app
      - name: Build Backstage
        env:
          YARN_ENABLE_IMMUTABLE_INSTALLS: false
        run: |
          export NVM_DIR="$HOME/.nvm"
          [ -s "$NVM_DIR/nvm.sh" ] && . "$NVM_DIR/nvm.sh"

          cd $HOME/my-backstage-app
          yarn tsc
          yarn build:backend


      - name: Commit & Push generated app
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

          git add .
          git commit -m "Add generated Backstage app" || echo "Nothing to commit"
          git push origin HEAD:main 
